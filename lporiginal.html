<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title"></title>
<meta name="description" id="page-desc">
<meta property="og:title" id="og-title">
<meta property="og:description" id="og-desc">
<meta property="og:image" id="og-image">
<meta property="og:type" content="website">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg-dark:       #23261f;
    --bg-dark-mid:   #1c1e18;
    --bg-dark-light: #2e3128;
    --bg-light:      #eef0ea;
    --bg-light-dark: #e3e7dc;
    --white:         #ffffff;
    --accent:        #b89060;
    --accent-light:  #d4b080;
    --gold:          #cdab7e;
    --text-muted:    #6e7263;
    --font-serif:    'Noto Serif TC', serif;
    --font-sans:     'Noto Sans TC', sans-serif;
    --font-latin:    'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-sans); background: var(--bg-light); color: var(--bg-dark); overflow-x: hidden; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px;
    background: rgba(28,20,16,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #333;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-mark {
    width: 36px; height: 36px; background: var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif); font-weight: 900; font-size: 16px; color: white; flex-shrink: 0;
  }
  .nav-logo-text {
    font-family: var(--font-latin); font-size: 13px; letter-spacing: 0.18em;
    color: var(--bg-light); font-weight: 400; text-transform: uppercase;
  }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-cta {
    background: var(--accent); color: white; border: none;
    padding: 10px 22px; font-family: var(--font-sans); font-size: 13px;
    letter-spacing: 0.08em; cursor: pointer; text-decoration: none;
    transition: background 0.2s; white-space: nowrap;
  }
  .nav-cta:hover { background: var(--accent-light); }

  /* ── HAMBURGER ── */
  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 4px; background: none; border: none;
  }
  .hamburger span {
    display: block; width: 22px; height: 2px;
    background: var(--bg-light); border-radius: 2px;
    transition: all 0.25s ease;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ── MOBILE MENU ── */
  .mobile-menu {
    display: none; position: fixed; top: 73px; left: 0; right: 0; z-index: 99;
    background: rgba(92,51,24,0.98); backdrop-filter: blur(8px);
    border-bottom: 1px solid #333;
    flex-direction: column;
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .mobile-menu.open { max-height: 400px; }
  .mobile-menu a {
    display: block; padding: 16px 28px;
    font-size: 15px; color: var(--bg-light); text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  .mobile-menu a:hover { background: rgba(255,255,255,0.06); }
  .mobile-menu .menu-cta {
    margin: 16px 28px 20px;
    display: block; text-align: center;
    background: var(--accent); color: white; text-decoration: none;
    padding: 14px; font-size: 14px; letter-spacing: 0.08em;
  }

  @media (max-width: 600px) {
    .nav-cta { display: none; }
    .hamburger { display: flex; }
    .mobile-menu { display: flex; }
    .nav-logo-text { font-size: 11px; letter-spacing: 0.12em; }
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; background: var(--bg-dark);
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 120px 28px 80px; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(205,171,126,0.10) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-family: var(--font-latin); font-size: 11px; letter-spacing: 0.3em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .hero-eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--accent); }
  .hero-title {
    font-family: var(--font-serif); font-size: clamp(48px, 12vw, 88px);
    font-weight: 900; color: var(--white); line-height: 1.05;
    margin-bottom: 24px; letter-spacing: -0.02em;
  }
  .hero-title em { font-style: normal; color: var(--gold); }
  .hero-sub {
    font-size: 15px; color: #aaa; line-height: 1.8;
    max-width: 340px; margin-bottom: 48px; font-weight: 300; letter-spacing: 0.04em;
  }
  .hero-quote { border-left: 3px solid var(--accent); padding-left: 20px; margin-bottom: 48px; max-width: 340px; }
  .hero-quote p { font-family: var(--font-serif); font-size: 15px; color: #ccc; line-height: 1.8; font-style: italic; }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 12px;
    background: var(--accent); color: white; text-decoration: none;
    padding: 18px 36px; font-size: 15px; letter-spacing: 0.08em;
    font-family: var(--font-sans); transition: all 0.2s;
  }
  .hero-cta:hover { background: var(--accent-light); gap: 18px; }
  .hero-cta-arrow { font-size: 18px; transition: transform 0.2s; }
  .hero-cta:hover .hero-cta-arrow { transform: translateX(4px); }
  .hero-stats {
    display: flex; gap: 40px; margin-top: 64px;
    padding-top: 40px; border-top: 1px solid #333; width: 100%;
  }
  .hero-stat-num { font-family: var(--font-serif); font-size: 28px; font-weight: 900; color: var(--gold); line-height: 1; margin-bottom: 4px; }
  .hero-stat-label { font-size: 11px; color: #666; letter-spacing: 0.1em; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero-eyebrow { animation: fadeUp 0.7s ease 0.10s both; }
  .hero-title   { animation: fadeUp 0.7s ease 0.20s both; }
  .hero-sub     { animation: fadeUp 0.7s ease 0.35s both; }
  .hero-quote   { animation: fadeUp 0.7s ease 0.45s both; }
  .hero-cta     { animation: fadeUp 0.7s ease 0.55s both; }
  .hero-stats   { animation: fadeUp 0.7s ease 0.65s both; }

  /* ── SECTION BASE ── */
  .section { padding: 80px 28px; }
  .section-dark { background: var(--bg-dark); color: var(--white); }
  .section-label {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-latin); font-size: 11px; letter-spacing: 0.25em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 20px;
  }
  .section-dark .section-label { color: #555; }
  .section-title { font-family: var(--font-serif); font-size: clamp(28px, 8vw, 44px); font-weight: 900; line-height: 1.2; margin-bottom: 24px; }
  .section-body { font-size: 14px; line-height: 1.9; color: #555; max-width: 480px; }
  .section-dark .section-body { color: #999; }

  /* ── PHILOSOPHY ── */
  .philosophy-statement {
    font-family: var(--font-serif); font-size: clamp(22px, 6vw, 32px);
    font-weight: 700; line-height: 1.5; color: var(--bg-dark);
    margin-bottom: 32px; border-left: 4px solid var(--accent); padding-left: 24px;
  }
  .philosophy-body { font-size: 15px; line-height: 2; color: #555; margin-bottom: 20px; }
  .highlight-box { background: var(--bg-dark); padding: 24px; margin-top: 32px; }
  .highlight-box p { font-family: var(--font-serif); font-size: 16px; color: var(--gold); line-height: 1.7; font-weight: 700; }

  /* ── STORY ── */
  .story-image-frame {
    width: 100%; min-height: 420px; background: var(--bg-dark);
    position: relative; overflow: hidden; display: flex; align-items: flex-end;
  }
  .story-photo {
    position: absolute; bottom: 0; right: 0; height: 110%; width: auto;
    object-fit: contain; object-position: bottom right;
    filter: drop-shadow(0 0 40px rgba(205,171,126,0.15));
  }
  .story-image-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%); }
  .story-image-label { position: relative; z-index: 2; padding: 24px; }
  .story-image-label .tag { font-family: var(--font-latin); font-size: 10px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
  .story-image-label .name { font-family: var(--font-serif); font-size: 20px; font-weight: 700; color: white; }
  .story-image-label .sub { font-size: 11px; color: #888; letter-spacing: 0.1em; margin-top: 4px; }

  .timeline-item { padding: 28px 0; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 80px 1fr; gap: 20px; align-items: start; }
  .timeline-tag { font-family: var(--font-latin); font-size: 10px; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; padding-top: 3px; font-weight: 600; }
  .timeline-content h4 { font-family: var(--font-serif); font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--bg-dark); }
  .timeline-content p { font-size: 13px; line-height: 1.8; color: #666; }

  .credential-box { margin-top: 32px; padding: 24px; background: var(--white); border-left: 3px solid var(--gold); }
  .credential-group-title { font-family: var(--font-latin); font-size: 10px; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .credential-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--bg-dark); line-height: 1.6; margin-bottom: 8px; }
  .credential-item::before { content: '✓'; color: var(--gold); flex-shrink: 0; font-weight: 700; }
  .credential-group + .credential-group { margin-top: 16px; }
  .credential-stats { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  .credential-stat { flex: 1; min-width: 90px; background: var(--bg-dark); padding: 16px 12px; text-align: center; }
  .credential-stat-num { font-family: var(--font-serif); font-size: 20px; font-weight: 900; color: var(--gold); margin-bottom: 4px; }
  .credential-stat-label { font-size: 11px; color: #999; letter-spacing: 0.05em; }

  /* ── CURRICULUM ── */
  .curriculum-intro { font-size: 14px; color: #999; margin-bottom: 36px; line-height: 1.7; }
  .stage-card { background: var(--bg-dark-mid); margin-bottom: 3px; overflow: hidden; position: relative; }
  .stage-card-inner { padding: 32px 28px; position: relative; z-index: 1; }
  .stage-num { font-family: var(--font-latin); font-size: 48px; font-weight: 300; color: rgba(255,255,255,0.06); position: absolute; top: 16px; right: 24px; line-height: 1; pointer-events: none; user-select: none; }
  .stage-tag { font-family: var(--font-latin); font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .stage-name { font-family: var(--font-serif); font-size: 22px; font-weight: 900; color: white; margin-bottom: 8px; line-height: 1.3; }
  .stage-desc { font-size: 13px; color: #999; line-height: 1.7; }
  .stage-keyword-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .stage-keyword { border: 1px solid #444; padding: 5px 12px; font-size: 11px; color: #888; letter-spacing: 0.05em; }
  .week-list { margin-top: 16px; padding-top: 12px; border-top: 1px solid #333; }
  .week-item { display: flex; align-items: baseline; gap: 10px; font-size: 12px; color: #aaa; line-height: 1.7; padding: 4px 0; }
  .week-item .week-num { font-family: var(--font-latin); font-size: 11px; color: var(--gold); flex-shrink: 0; letter-spacing: 0.05em; }

  /* ── COMPARE ── */
  .compare-table { margin-top: 28px; width: 100%; border-collapse: collapse; font-size: 12px; }
  .compare-table th, .compare-table td { border: 1px solid var(--bg-light-dark); padding: 14px 8px; text-align: center; line-height: 1.6; }
  .compare-table th { font-family: var(--font-serif); font-size: 13px; font-weight: 700; background: var(--bg-light-dark); color: var(--bg-dark); }
  .compare-table td:first-child, .compare-table th:first-child { text-align: left; font-weight: 700; color: var(--text-muted); width: 30%; }
  .compare-table .compare-highlight { background: var(--bg-dark); color: var(--white); font-weight: 700; }
  .compare-table th.compare-highlight { color: var(--gold); }

  /* ── TARGET ── */
  .target-card { background: var(--white); padding: 24px; margin-bottom: 12px; border-left: 3px solid transparent; transition: border-color 0.2s; }
  .target-card:hover { border-color: var(--accent); }
  .target-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .target-icon { width: 40px; height: 40px; background: #e8f0f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .target-role { font-family: var(--font-serif); font-size: 16px; font-weight: 700; color: var(--bg-dark); }
  .target-pain { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.6; }
  .target-divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  .target-result-label { font-family: var(--font-latin); font-size: 10px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .target-result-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; font-size: 13px; color: var(--bg-dark); line-height: 1.5; }
  .target-result-item::before { content: '→'; color: var(--accent); flex-shrink: 0; margin-top: 1px; }

  /* ── TESTIMONIALS ── */
  .testimonial-card { background: var(--bg-dark-mid); padding: 28px 24px; margin-bottom: 12px; position: relative; }
  .testimonial-quote-mark { font-family: var(--font-serif); font-size: 64px; color: var(--gold); opacity: 0.2; position: absolute; top: 10px; left: 20px; line-height: 1; pointer-events: none; }
  .testimonial-result { font-family: var(--font-serif); font-size: 20px; font-weight: 900; color: var(--gold); margin-bottom: 12px; padding-top: 8px; position: relative; z-index: 1; }
  .testimonial-text { font-size: 13px; color: #aaa; line-height: 1.8; margin-bottom: 20px; position: relative; z-index: 1; }
  .testimonial-person { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
  .testimonial-avatar { width: 36px; height: 36px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
  .testimonial-name { font-size: 14px; font-weight: 500; color: white; }
  .testimonial-meta { font-size: 11px; color: #666; letter-spacing: 0.05em; }

  /* ── FAQ ── */
  .faq-item { border-bottom: 1px solid #e0dbd4; overflow: hidden; }
  .faq-q { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; cursor: pointer; gap: 16px; }
  .faq-num { font-family: var(--font-latin); font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; flex-shrink: 0; width: 32px; }
  .faq-question { font-size: 14px; font-weight: 500; color: var(--bg-dark); flex: 1; line-height: 1.5; }
  .faq-toggle { font-size: 18px; color: var(--accent); flex-shrink: 0; transition: transform 0.25s; font-weight: 300; line-height: 1; }
  .faq-item.open .faq-toggle { transform: rotate(45deg); }
  .faq-a { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; padding-left: 32px; }
  .faq-item.open .faq-a { max-height: 200px; }
  .faq-answer { font-size: 13px; line-height: 1.9; color: #777; padding-bottom: 20px; }

  /* ── CTA ── */
  .cta-section { background: var(--bg-dark); padding: 80px 28px; text-align: center; }
  .cta-label { font-family: var(--font-latin); font-size: 11px; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 24px; }
  .cta-title { font-family: var(--font-serif); font-size: clamp(26px, 7vw, 40px); font-weight: 900; color: white; line-height: 1.3; margin-bottom: 16px; }
  .cta-sub { font-size: 14px; color: #777; line-height: 1.8; margin-bottom: 40px; max-width: 320px; margin-left: auto; margin-right: auto; }
  .cta-btn { display: inline-flex; align-items: center; gap: 12px; background: var(--accent); color: white; text-decoration: none; padding: 20px 40px; font-size: 15px; letter-spacing: 0.08em; font-family: var(--font-sans); transition: all 0.2s; margin-bottom: 20px; }
  .cta-btn:hover { background: var(--accent-light); gap: 18px; }
  .cta-note { font-size: 11px; color: #555; letter-spacing: 0.1em; }

  /* ── GUARANTEE ── */
  .guarantee-box { margin-top: 32px; padding: 28px 24px; background: var(--bg-dark-light); text-align: center; border: 1px solid var(--gold); }
  .guarantee-badge { display: inline-block; font-family: var(--font-latin); font-size: 11px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; border: 1px solid var(--gold); border-radius: 999px; padding: 6px 18px; margin-bottom: 16px; }
  .guarantee-title { font-family: var(--font-serif); font-size: 22px; font-weight: 900; color: var(--white); margin-bottom: 12px; }
  .guarantee-body { font-size: 13px; color: #999; line-height: 1.8; max-width: 480px; margin: 0 auto; }

  /* ── STICKY BAR ── */
  .sticky-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26,26,26,0.97); border-top: 1px solid #333; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 99; backdrop-filter: blur(8px); }
  .sticky-bar-text { font-size: 12px; color: #888; line-height: 1.4; }
  .sticky-bar-text strong { color: white; font-size: 13px; display: block; }
  .sticky-bar-btn { background: var(--accent); color: white; text-decoration: none; padding: 12px 24px; font-size: 13px; letter-spacing: 0.06em; white-space: nowrap; transition: background 0.2s; flex-shrink: 0; }
  .sticky-bar-btn:hover { background: var(--accent-light); }

  /* ── FOOTER ── */
  footer { background: #1c1410; padding: 40px 28px 120px; text-align: center; }
  .footer-logo { font-family: var(--font-serif); font-size: 18px; font-weight: 900; color: white; margin-bottom: 8px; }
  .footer-sub { font-size: 11px; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 24px; }
  .footer-note { font-size: 11px; color: #cbb8a8; line-height: 1.7; }
</style>
</head>
<body>

       </div>
     </div>`
  ).join('');

  // compare
  document.getElementById('compare-title').innerHTML      = c.compare.sectionTitle;
  document.getElementById('compare-intro').textContent    = c.compare.intro;
  document.getElementById('compare-table').innerHTML      =
    `<tr>${c.compare.headers.map((h, i) =>
      `<th${i===c.compare.headers.length-1?' class="compare-highlight"':''}>${h}</th>`
    ).join('')}</tr>` +
    c.compare.rows.map(row =>
      `<tr>${row.map((cell, i) =>
        `<td${i===row.length-1?' class="compare-highlight"':''}>${cell}</td>`
      ).join('')}</tr>`
    ).join('');

  // target
  document.getElementById('target-title').innerHTML    = c.target.sectionTitle;
  document.getElementById('target-intro').textContent  = c.target.intro;
  document.getElementById('target-cards').innerHTML    = c.target.cards.map(card =>
    `<div class="target-card">
       <div class="target-header">
         <div class="target-icon">${card.icon}</div>
         <div class="target-role">${card.role}</div>
       </div>
       <p class="target-pain">${card.pain}</p>
       <hr class="target-divider">
       <div class="target-result-label">上完課，你會</div>
       ${card.results.map(r => `<div class="target-result-item">${r}</div>`).join('')}
     </div>`
  ).join('');

  // testimonials
  document.getElementById('testimonial-cards').innerHTML = c.testimonials.map(t =>
    `<div class="testimonial-card">
       <div class="testimonial-quote-mark">"</div>
       <div class="testimonial-result">${t.result}</div>
       <p class="testimonial-text">${t.text}</p>
       <div class="testimonial-person">
         <div class="testimonial-avatar">${t.avatar}</div>
         <div>
           <div class="testimonial-name">${t.name}</div>
           <div class="testimonial-meta">${t.meta}</div>
         </div>
       </div>
     </div>`
  ).join('');

  // faq
  document.getElementById('faq-items').innerHTML = c.faqs.map((f, i) =>
    `<div class="faq-item${i===0?' open':''}">
       <div class="faq-q" onclick="toggleFaq(this)">
         <span class="faq-num">Q${String(i+1).padStart(2,'0')}</span>
         <span class="faq-question">${f.q}</span>
         <span class="faq-toggle">+</span>
       </div>
       <div class="faq-a"><p class="faq-answer">${f.a}</p></div>
     </div>`
  ).join('');

  // cta
  document.getElementById('cta-title').innerHTML      = c.cta.title;
  document.getElementById('cta-sub').textContent      = c.cta.sub;
  document.getElementById('cta-btn').textContent      = c.cta.btnText;
  document.getElementById('cta-btn').href             = c.nav.ctaUrl;
  document.getElementById('cta-note').textContent     = c.cta.note;
  document.getElementById('guarantee-badge').textContent = c.cta.guaranteeBadge;
  document.getElementById('guarantee-title').textContent = c.cta.guaranteeTitle;
  document.getElementById('guarantee-body').textContent  = c.cta.guaranteeBody;

  // footer
  document.getElementById('footer-brand').textContent    = c.footer.brand;
  document.getElementById('footer-subtitle').textContent = c.footer.subtitle;
  document.getElementById('footer-note').innerHTML       = c.footer.note;

  // sticky
  document.getElementById('sticky-brand').textContent   = c.sticky.brand;
  document.getElementById('sticky-tagline').textContent = c.sticky.tagline;
  document.getElementById('sticky-btn').textContent     = c.sticky.btnText;
  document.getElementById('sticky-btn').href            = c.nav.ctaUrl;
})();

// ── FAQ toggle ──────────────────────────────────────────────
function toggleFaq(el) {
  const item = el.parentElement;
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

// ── Hamburger ───────────────────────────────────────────────
const hamburger   = document.getElementById('hamburger');
const mobileMenu  = document.getElementById('mobile-menu');
hamburger.addEventListener('click', () => {
  const open = mobileMenu.classList.toggle('open');
  hamburger.classList.toggle('open', open);
});
function closeMenu() {
  mobileMenu.classList.remove('open');
  hamburger.classList.remove('open');
}
</script>
</body>
</html>
